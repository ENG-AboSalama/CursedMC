<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CursedMC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-box {
            background: #111;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 48px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 8px;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 32px;
        }
        
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 24px;
        }
        
        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }
        
        label {
            display: block;
            color: #888;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 14px 16px;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        
        input:focus {
            outline: none;
            border-color: #7c3aed;
        }
        
        button {
            width: 100%;
            background: #7c3aed;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        button:hover {
            background: #6d28d9;
        }
        
        .footer {
            margin-top: 32px;
            color: #444;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">💀</div>
        <h1>CursedMC</h1>
        <p class="subtitle">Enter password to continue</p>
        
        {% if error %}
        <div class="error-msg">
            Incorrect password. Try again.
        </div>
        {% endif %}
        
        <form method="POST">
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" autofocus required>
            </div>
            <button type="submit">Login</button>
        </form>
        
        <div class="footer">
            &copy; 2026 CursedMC. All rights reserved.
        </div>
    </div>
</body>
</html>
